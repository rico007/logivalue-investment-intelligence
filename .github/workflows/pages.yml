name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # Stage only the public site. Dev docs and source-only files are kept in
      # the repo but excluded from what GitHub Pages serves.
      - name: Stage public site
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude '_backups' \
            --exclude '.remember' \
            --exclude '.code-review-graph' \
            --exclude '.DS_Store' \
            --exclude '*.md' \
            --exclude '*.pptx'
          # Disable Jekyll so nothing is post-processed or stripped.
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
